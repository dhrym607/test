<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭科テスト予想問題</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    font-size:22px;
    text-align:center;
}

#number{
    color:#666;
    margin-bottom:15px;
}

#question{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:20px;
}

#answer{
    display:none;
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.show{
    background:#2196F3;
    color:white;
}

.next{
    background:#4CAF50;
    color:white;
}

.shuffle{
    background:#FF9800;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>家庭科テスト予想問題</h1>

<div id="number"></div>

<div id="question"></div>

<button class="show" onclick="showAnswer()">
答えを見る
</button>

<div id="answer"></div>

<button class="next" onclick="nextQuestion()">
次の問題
</button>



</div>

<script>

let questions = [

{q:"家庭の基本的機能を5つ答えなさい。",a:"食事、育児、着心地（衣生活）、住居、介護。"},
{q:"家庭の機能を6つ答えなさい。",a:"愛情を育てる、心の安らぎを得る、子どもを育てる、生活文化を伝える、地域活動との交流、収入を得る。"},
{q:"家庭が子どもに伝えるものを何という？",a:"生活文化。"},
{q:"家庭が果たす精神的な役割を2つ答えなさい。",a:"愛情を育てる、心の安らぎを得る。"},
{q:"男女共同参画社会基本法は何年に施行された？",a:"1999年。"},
{q:"男女共同参画社会とはどのような社会？",a:"男女が互いの人権を尊重し、性別に関係なく個性や能力を発揮できる社会。"},
{q:"ワーク・ライフ・バランスとは何か？",a:"仕事と生活の調和。"},
{q:"ワーク・ライフ・バランスが必要な理由は？",a:"仕事と家庭生活を両立し、充実した生活を送るため。"},
{q:"人の一生で0歳から1歳頃までを何期という？",a:"乳児期。"},
{q:"人の一生で1歳から6歳頃までを何期という？",a:"幼児期。"},
{q:"人の一生で6歳から12歳頃までを何期という？",a:"児童期。"},
{q:"人の一生で12歳頃からを何期という？",a:"青年期。"},
{q:"出生時の身長は約何cm？",a:"約50cm。"},
{q:"1歳の身長は約何cm？",a:"約75cm。"},
{q:"4歳の身長は約何cm？",a:"約100cm。"},
{q:"出生時の体重は約何kg？",a:"約3kg。"},
{q:"1歳の体重は約何kg？",a:"約9kg。"},
{q:"4歳の体重は約何kg？",a:"約15kg。"},
{q:"発達の方向性とは何か？",a:"頭から下へ、体の中心から末端へなど一定の方向に向かって発達すること。"},
{q:"発達の順序性とは何か？",a:"発達には順番があり、その順序が決まっていること。"},
{q:"発達の順序性の例を1つ答えなさい。",a:"首が座る→座る→立つ→歩く。"},
{q:"幼児は成人と比べて呼吸数や脈拍数はどうか？",a:"多い。"},
{q:"幼児の体温の特徴は？",a:"体温が高く汗をかきやすい。"},
{q:"幼児は体の大きさに比べてどの部分が大きい？",a:"頭。"},
{q:"幼児が転びやすい理由は？",a:"頭が大きくバランスを取るのが難しいため。"},
{q:"発達には個人差があるとはどういう意味？",a:"成長の速さや時期には人によって違いがあること。"},

{q:"幼児が泣くのは何のため？",a:"自分の欲求（快・不快）を周りに伝えるため。"},
{q:"生後6ヶ月頃から現れる、特定の身近な人（母親など）への強い結びつきを何という？",a:"愛着（アタッチメント）。"},
{q:"愛着（アタッチメント）が幼児の心の発達に大切な理由は？",a:"安心感、信頼感、自立心を育てる基盤となり、人への信頼感（コミュニケーションの準備）に繋がるため。"},
{q:"幼児に見られる、見知らぬ人に対して警戒したり嫌がったりする反応を何という？",a:"人見知り。"},
{q:"幼児が自分の意志を通そうとして、大人の指示に反抗したり拒否したりする時期を何という？",a:"第一反抗期（イヤイヤ期）。"},
{q:"第一反抗期は、幼児のどのような心の現れ？",a:"自我が生まれ、自己主張ができるようになった証拠。"},
{q:"幼児の基本的な感情は、どのような順番で分化（発達）していく？",a:"快・不快 → 怒り・恐れ・喜び → 嫉妬・愛など（徐々に複雑に分化する）。"},
{q:"食事、睡眠、排泄、衣服の着脱、清潔など、生きていく上で必要な毎日の習慣を何という？",a:"基本的生活習慣。"},
{q:"挨拶をする、マナーやルールを守るなど、人と関わりながら社会の一員として暮らすために必要な習慣を何という？",a:"社会的生活習慣。"},
{q:"基本的生活習慣が自立すると、どのようなメリットがある？",a:"自分のことは自分でできるようになり、自信や自立心が育つ。"},
{q:"幼児の時期の主な活動（学習の世界）は何？",a:"遊び。"},
{q:"幼児の遊びにはどのような種類がある？（例を3つ）",a:"一人遊び、ごっこ遊び、外遊び（集団遊び）。"},
{q:"幼児にとっての「遊び」の役割や効果を3つ答えなさい。",a:"体の発達（運動能力）、心の充実（想像力・集中力）、社会性の発達（ルール、コミュニケーション）。"},
{q:"幼児の安全を守るためのマークで、幼児向けのおもちゃに付いているマークは？",a:"STマーク（玩具安全マーク）。"},
{q:"幼児の安全を守るためのマークで、乳幼児用の自動車シート（チャイルドシート）に付いているマークは？",a:"Eマーク（または新基準適合マーク）。"},
{q:"デジタル動画やゲームが幼児に与える影響で、配慮すべき点は？",a:"視力の低下、生活リズムの乱れ、コミュニケーション不足、親子の対話減少など（長時間の使用を避ける）。"},

{q:"言葉の役割は何ですか？",a:"自分の思いや考えを表現し、人とのコミュニケーションをとること。"},
{q:"幼児の言葉の発達は何によって進みますか？",a:"積極的な関わり。"},
{q:"一語文とは何ですか？",a:"1つの言葉で意味を表す文。"},
{q:"二語文とは何ですか？",a:"2つの言葉を組み合わせた文。"},
{q:"三語文とは何ですか？",a:"3つ以上の言葉を組み合わせた文。"},
{q:"心の発達で生まれるものは何ですか？",a:"自我。"},
{q:"自我が発達すると現れる時期を何といいますか？",a:"第一次反抗期（イヤイヤ期）。"},
{q:"幼児期に身につける生活習慣は大きく何種類に分けられますか？",a:"基本的生活習慣と社会的生活習慣。"},
{q:"基本的生活習慣とは何ですか？",a:"生きていくために必要な習慣。"},
{q:"基本的生活習慣は将来何につながりますか？",a:"健康的な生活。"},
{q:"基本的生活習慣は何の基盤になりますか？",a:"生活の基盤。"},
{q:"基本的生活習慣の例を3つ答えなさい。",a:"睡眠、食事、入浴（トイレでも可）。"},
{q:"社会的生活習慣とは何ですか？",a:"社会の一員として生活するために必要な習慣。"},
{q:"社会的生活習慣で大切なものを2つ答えなさい。",a:"約束事、マナー。"},
{q:"社会的生活習慣の例を答えなさい。",a:"安全の習慣、社会ルールを守る習慣、人間関係の習慣。"},
{q:"幼児の生活時間で特に長いものは何ですか？",a:"睡眠。"},
{q:"幼児は1日何食が望ましいですか？",a:"5食。"},
{q:"幼児にとって生活の中心となるものは何ですか？",a:"遊び。"},
{q:"遊びによって育つ力を3つ答えなさい。",a:"運動機能、感性、人との関わり。"},
{q:"1歳頃の遊びの特徴は何ですか？",a:"大人と遊び、満足感を得る。"},
{q:"2歳頃の遊びの特徴は何ですか？",a:"一人遊びが増え、内面の世界が育つ。"},
{q:"3歳頃の遊びの特徴は何ですか？",a:"友達と遊び、思いやりが育つ。"},
{q:"5歳頃の遊びの特徴は何ですか？",a:"ルールを守りながら遊べるようになる。"},
{q:"遊びを豊かにするために大切なことは何ですか？",a:"遊び環境を整えること。"},
{q:"遊び道具は何を育てますか？",a:"想像力。"},
{q:"自然の素材は遊び道具になりますか？",a:"なる。"},
{q:"市販のおもちゃを選ぶ際に確認する安全マークは何ですか？",a:"STマーク。"},
{q:"STマークは何を表していますか？",a:"安全性が確認された玩具。"},
{q:"盲導犬マークは何を表していますか？",a:"盲導犬同伴者への理解を示すマーク。"},
{q:"うさぎマークは何を表していますか？",a:"聴覚障害者に関するマーク。"},
{q:"幼児期の遊びで育つ『人との関わり』とはどのような力ですか？",a:"協力したり思いやったりする力。"},
{q:"幼児の生活習慣を身につける上で大人の役割は何ですか？",a:"繰り返し支援し手本を示すこと。"}

];


let index = 0;

function displayQuestion(){
    document.getElementById("number").innerHTML =
        (index+1)+" / "+questions.length;

    document.getElementById("question").innerHTML =
        questions[index].q;

    document.getElementById("answer").style.display="none";

    document.getElementById("answer").innerHTML =
        "<b>答え：</b>"+questions[index].a;
}

function showAnswer(){
    document.getElementById("answer").style.display="block";
}

function nextQuestion(){
    index++;
    if(index>=questions.length){
        index=0;
    }
    displayQuestion();
}

function shuffleQuestions(){
    questions.sort(()=>Math.random()-0.5);
    index=0;
    displayQuestion();
}

displayQuestion();

</script>

</body>
</html>

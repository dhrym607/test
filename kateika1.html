<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭科テスト予想問題</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    font-size:22px;
    text-align:center;
}

#number{
    color:#666;
    margin-bottom:15px;
}

#question{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:20px;
}

#answer{
    display:none;
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.show{
    background:#2196F3;
    color:white;
}

.next{
    background:#4CAF50;
    color:white;
}

.shuffle{
    background:#FF9800;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>家庭科テスト予想問題</h1>

<div id="number"></div>

<div id="question"></div>

<button class="show" onclick="showAnswer()">
答えを見る
</button>

<div id="answer"></div>

<button class="next" onclick="nextQuestion()">
次の問題
</button>



</div>

<script>

let questions = [

{q:"家庭の基本的機能を5つ答えなさい。",a:"食事、育児、着心地（衣生活）、住居、介護。"},
{q:"家庭の機能を6つ答えなさい。",a:"愛情を育てる、心の安らぎを得る、子どもを育てる、生活文化を伝える、地域活動との交流、収入を得る。"},
{q:"家庭が子どもに伝えるものを何という？",a:"生活文化。"},
{q:"家庭が果たす精神的な役割を2つ答えなさい。",a:"愛情を育てる、心の安らぎを得る。"},
{q:"男女共同参画社会基本法は何年に施行された？",a:"1999年。"},
{q:"男女共同参画社会とはどのような社会？",a:"男女が互いの人権を尊重し、性別に関係なく個性や能力を発揮できる社会。"},
{q:"ワーク・ライフ・バランスとは何か？",a:"仕事と生活の調和。"},
{q:"ワーク・ライフ・バランスが必要な理由は？",a:"仕事と家庭生活を両立し、充実した生活を送るため。"},
{q:"人の一生で0歳から1歳頃までを何期という？",a:"乳児期。"},
{q:"人の一生で1歳から6歳頃までを何期という？",a:"幼児期。"},
{q:"人の一生で6歳から12歳頃までを何期という？",a:"児童期。"},
{q:"人の一生で12歳頃からを何期という？",a:"青年期。"},
{q:"出生時の身長は約何cm？",a:"約50cm。"},
{q:"1歳の身長は約何cm？",a:"約75cm。"},
{q:"4歳の身長は約何cm？",a:"約100cm。"},
{q:"出生時の体重は約何kg？",a:"約3kg。"},
{q:"1歳の体重は約何kg？",a:"約9kg。"},
{q:"4歳の体重は約何kg？",a:"約15kg。"},
{q:"発達の方向性とは何か？",a:"頭から下へ、体の中心から末端へなど一定の方向に向かって発達すること。"},
{q:"発達の順序性とは何か？",a:"発達には順番があり、その順序が決まっていること。"},
{q:"発達の順序性の例を1つ答えなさい。",a:"首が座る→座る→立つ→歩く。"},
{q:"幼児は成人と比べて呼吸数や脈拍数はどうか？",a:"多い。"},
{q:"幼児の体温の特徴は？",a:"体温が高く汗をかきやすい。"},
{q:"幼児は体の大きさに比べてどの部分が大きい？",a:"頭。"},
{q:"幼児が転びやすい理由は？",a:"頭が大きくバランスを取るのが難しいため。"},
{q:"発達には個人差があるとはどういう意味？",a:"成長の速さや時期には人によって違いがあること。"}

];


let index = 0;

function displayQuestion(){
    document.getElementById("number").innerHTML =
        (index+1)+" / "+questions.length;

    document.getElementById("question").innerHTML =
        questions[index].q;

    document.getElementById("answer").style.display="none";

    document.getElementById("answer").innerHTML =
        "<b>答え：</b>"+questions[index].a;
}

function showAnswer(){
    document.getElementById("answer").style.display="block";
}

function nextQuestion(){
    index++;
    if(index>=questions.length){
        index=0;
    }
    displayQuestion();
}

function shuffleQuestions(){
    questions.sort(()=>Math.random()-0.5);
    index=0;
    displayQuestion();
}

displayQuestion();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美術テスト予想問題</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    font-size:22px;
    text-align:center;
}

#number{
    color:#666;
    margin-bottom:15px;
}

#question{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:20px;
}

#answer{
    display:none;
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.show{
    background:#2196F3;
    color:white;
}

.next{
    background:#4CAF50;
    color:white;
}

.shuffle{
    background:#FF9800;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>美術テスト予想問題</h1>

<div id="number"></div>

<div id="question"></div>

<button class="show" onclick="showAnswer()">
答えを見る
</button>

<div id="answer"></div>

<button class="next" onclick="nextQuestion()">
次の問題
</button>



</div>

<script>

let questions = [

{q:"『太陽の塔』の作者は誰ですか？",a:"岡本太郎。"},
{q:"『太陽の塔』の素材は何ですか？",a:"鉄筋コンクリート。"},
{q:"『太陽の塔』が制作されたきっかけとなった博覧会は？",a:"1970年大阪万博（日本万国博覧会）。"},
{q:"『太陽の塔』は現在どこにありますか？",a:"大阪府吹田市の万博記念公園。"},
{q:"『太陽の塔』のテーマとして表現されているものは？",a:"生命のエネルギーや人間の力強さ。"},
{q:"『明日の神話』の作者は誰ですか？",a:"岡本太郎。"},
{q:"『明日の神話』はどこに展示されていますか？",a:"東京・渋谷駅。"},
{q:"『明日の神話』の題材となった出来事は？",a:"原爆被害。"},
{q:"『芸術は爆発だ』と言った芸術家は誰ですか？",a:"岡本太郎。"},
{q:"岡本太郎はどのような芸術家として知られていますか？",a:"前衛芸術家。"},
{q:"岡本太郎の代表作を2つ答えなさい。",a:"太陽の塔、明日の神話。"},
{q:"『縄文人』の作者は誰ですか？",a:"岡本太郎。"},
{q:"『縄文人』はどこに所蔵されていますか？",a:"川崎市岡本太郎美術館。"},
{q:"『縄文人』の素材は何ですか？",a:"繊維強化プラスチック（FRP）。"},
{q:"FRPとは何の略ですか？",a:"繊維強化プラスチック。"},
{q:"岡本太郎の作品に共通する特徴は？",a:"力強く独創的な表現。"},
{q:"『松林図屏風』の作者は誰ですか？",a:"長谷川等伯。"},
{q:"『松林図屏風』が描かれた時代は？",a:"安土桃山時代。"},
{q:"『松林図屏風』は国宝ですか？",a:"国宝である。"},
{q:"『松林図屏風』はどこに所蔵されていますか？",a:"東京国立博物館。"},
{q:"『松林図屏風』の特徴は？",a:"墨の濃淡と余白で松林を表現している。"},
{q:"『松林図屏風』で表現されているものは？",a:"霧や空気感、奥行き。"},
{q:"水墨画とは何ですか？",a:"墨の濃淡だけで表現する絵画。"},
{q:"水墨画で重要な表現方法を3つ答えなさい。",a:"にじみ、ぼかし、かすれ。"},
{q:"にじみとは何ですか？",a:"水を含んだ紙に墨が広がる表現。"},
{q:"ぼかしとは何ですか？",a:"墨を水で薄めてなめらかに変化させる表現。"},
{q:"かすれとは何ですか？",a:"墨を少なくして擦れたように表現する技法。"},
{q:"濃墨とは何ですか？",a:"最も濃い墨。"},
{q:"中墨とは何ですか？",a:"中間の濃さの墨。"},
{q:"淡墨とは何ですか？",a:"薄い墨。"},
{q:"墨の濃淡は何を調節して作りますか？",a:"水の量。"},
{q:"積墨法とは何ですか？",a:"淡墨から順に重ねて描く技法。"},
{q:"積墨法の順番を答えなさい。",a:"淡墨→中墨→濃墨。"},
{q:"破墨法とは何ですか？",a:"乾かないうちに墨を重ねる技法。"},
{q:"没骨法とは何ですか？",a:"輪郭線を描かずに墨の濃淡だけで描く技法。"},
{q:"直筆とはどのような筆使いですか？",a:"筆を立てて描く方法。"},
{q:"直筆の特徴は？",a:"細く力強い線が描ける。"},
{q:"側筆とはどのような筆使いですか？",a:"筆を傾けて描く方法。"},
{q:"側筆の特徴は？",a:"太く幅のある線が描ける。"},
{q:"転筆とはどのような筆使いですか？",a:"筆を回転させながら描く方法。"},
{q:"転筆の特徴は？",a:"曲線や変化のある線が描ける。"},
{q:"絵巻物とは何ですか？",a:"横長の紙を巻物状にした絵画作品。"},
{q:"絵巻物はどちらからどちらへ見ますか？",a:"右から左へ。"},
{q:"絵巻物の特徴は？",a:"時間の流れを表現できる。"},
{q:"絵巻物を少しずつ開きながら鑑賞する理由は？",a:"場面の展開を楽しむため。"},
{q:"掛け軸とは何ですか？",a:"床の間などに掛けて鑑賞する作品。"},
{q:"掛け軸はどこに飾られることが多いですか？",a:"床の間。"},
{q:"襖絵とは何ですか？",a:"襖に描かれた絵画。"},
{q:"襖絵は何に合わせて描かれますか？",a:"部屋の用途や空間。"},
{q:"襖絵では何が重視されますか？",a:"図柄と表現。"},
{q:"屏風の役割を答えなさい。",a:"空間を仕切ったり飾ったりする。"},
{q:"日本の伝統絵画で重視されるものは？",a:"空間との調和。"},
{q:"日本美術で重要な『余白』にはどんな効果がありますか？",a:"広がりや静けさを感じさせる。"},
{q:"日本の伝統絵画は何と調和するように作られましたか？",a:"建築や生活空間。"},
{q:"尾形光琳は何時代の画家ですか？",a:"江戸時代。"},
{q:"『八橋蒔絵螺鈿硯箱』の作者は誰ですか？",a:"尾形光琳。"},
{q:"『八橋蒔絵螺鈿硯箱』はどこに所蔵されていますか？",a:"東京国立博物館。"},
{q:"『八橋蒔絵螺鈿硯箱』の素材は何ですか？",a:"木と漆。"},
{q:"蒔絵とは何ですか？",a:"漆で模様を描き金銀粉をまく技法。"},
{q:"螺鈿とは何ですか？",a:"貝殻をはめ込んで装飾する技法。"},
{q:"『燕子花図屏風』の作者は誰ですか？",a:"尾形光琳。"},
{q:"『燕子花図屏風』はどこに所蔵されていますか？",a:"根津美術館。"},
{q:"『燕子花図屏風』の素材は何ですか？",a:"紙本金地着色。"},
{q:"『燕子花図屏風』は何曲一双ですか？",a:"六曲一双。"},
{q:"六曲一双とは何ですか？",a:"6枚折りの屏風が左右一対になったもの。"},
{q:"尾形光琳の作品の特徴は？",a:"装飾性が高くデザイン性に優れる。"},
{q:"金地が使われる理由は？",a:"豪華さや明るさを表現するため。"},
{q:"日本の伝統絵画では何を表現するために余白を用いますか？",a:"空気感や広がり。"},
{q:"『松林図屏風』と『燕子花図屏風』の共通点は？",a:"どちらも屏風絵であり日本美術を代表する作品。"},
{q:"『松林図屏風』と『太陽の塔』の表現の違いは？",a:"松林図屏風は静かな表現、太陽の塔は力強い表現。"},
{q:"美術作品を鑑賞するときに注目することを3つ答えなさい。",a:"作者、時代、表現方法。"},
{q:"水墨画で色を使わずに表現できる理由は？",a:"墨の濃淡で光や奥行きを表現できるから。"},
{q:"日本美術の特徴を一言で表すと？",a:"空間との調和や余白の美を大切にする。"}

];


let index = 0;

function displayQuestion(){
    document.getElementById("number").innerHTML =
        (index+1)+" / "+questions.length;

    document.getElementById("question").innerHTML =
        questions[index].q;

    document.getElementById("answer").style.display="none";

    document.getElementById("answer").innerHTML =
        "<b>答え：</b>"+questions[index].a;
}

function showAnswer(){
    document.getElementById("answer").style.display="block";
}

function nextQuestion(){
    index++;
    if(index>=questions.length){
        index=0;
    }
    displayQuestion();
}

function shuffleQuestions(){
    questions.sort(()=>Math.random()-0.5);
    index=0;
    displayQuestion();
}

displayQuestion();

</script>

</body>
</html>

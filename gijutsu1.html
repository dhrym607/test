<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術テスト予想問題</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    font-size:22px;
    text-align:center;
}

#number{
    color:#666;
    margin-bottom:15px;
}

#question{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:20px;
}

#answer{
    display:none;
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.show{
    background:#2196F3;
    color:white;
}

.next{
    background:#4CAF50;
    color:white;
}

.shuffle{
    background:#FF9800;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>技術テスト予想問題</h1>

<div id="number"></div>

<div id="question"></div>

<button class="show" onclick="showAnswer()">
答えを見る
</button>

<div id="answer"></div>

<button class="next" onclick="nextQuestion()">
次の問題
</button>



</div>

<script>

let questions = [

// 追加用の問題データ（ここからコピー）

// === 1. 情報モラルと情報の特性 ===
{q:"情報社会において適切に活動するためのもととなる考え方や態度を何という？",a:"情報モラル。"},
{q:"SNSの3つの特性を答えなさい。",a:"可視性、拡散性、持続性。"},
{q:"人間の創造的活動によって生み出されたものを何という？",a:"知的財産。"},
{q:"思想や感情を創作的に表現したもので、文芸・学術・美術・音楽などに属するものを何という？",a:"著作物。"},
{q:"著作者の権利（財産権、人格権、隣接権など）を守るための権利を何という？",a:"著作権。"},
{q:"人工知能（AI）が事実に基づかない誤った情報を生成する現象を何という？",a:"ハルシネーション（幻覚）。"},

// === 2. 情報とコンピュータ ===
{q:"目的を達成するために、複数のものを組み合わせた仕組みを何という？",a:"システム。"},
{q:"コンピュータ本体やキーボードなどのように、形があって触れたり見たりできるものを何という？",a:"ハードウェア。"},
{q:"コンピュータの処理手順を記述したプログラムを何という？",a:"ソフトウェア。"},
{q:"目的に応じて使用するソフトウェア（インスタ、LINE、ゲームアプリなど）を何という？",a:"アプリケーションウェア。"},
{q:"アプリケーションソフトウェアの土台として働く、WindowsやAndroidなどの基本ソフトウェアを何という？",a:"オペレーティングシステム（OS）。"},
{q:"コンピュータの5つの主な機能を答えなさい。",a:"演算、制御、記憶、入力、出力。"},
{q:"コンピュータの5大機能のうち、キーボードやマウスなどが該当する装置は？",a:"入力装置。"},
{q:"コンピュータの頭脳にあたり、データの演算や各装置の制御を行う中心的な装置（部品）は？",a:"中央処理装置（CPU）。"},
{q:"データを保存するための装置で、メモリやストレージが含まれるものは？",a:"記憶装置。"},
{q:"ディスプレイやプリンタなど、処理結果を表示・出力する装置は？",a:"出力装置。"},
{q:"記憶装置のうち、一時的にデータを記憶させておくための場所を何という？",a:"メモリ。"},
{q:"記憶装置のうち、電源を切った状態でもデータを保存し続けるためのもの（ハードディスクやSSDなど）を何という？",a:"ストレージ。"},
{q:"コンピュータ・センサ等を使って自動的に目的とする動作をさせるための環境状態の情報を情報機器で取得することを何という？",a:"計測。"},
{q:"機器に命令を送って適切に動作させることを何という？",a:"制御。"},
{q:"周囲の状況（光、明るさ、温度など）を計測する部分を何という？",a:"センサ。"},
{q:"センサから送られた情報をもとに、次の動作を判断・判断し、命令を出す部分は？",a:"コンピュータ。"},
{q:"実際に動いたり光ったりするなど、出力や動作を行う部分を何という？",a:"アクチュエータ。"},
{q:"コンピュータとセンサ、あるいはアクチュエータなどの間で情報を繋ぐ役割をするものを何という？",a:"インターフェース。"},
{q:"情報を時間的に連続した量で表示する方式を何という？",a:"アナログ。"},
{q:"情報を段階的な値（数値）で表示する方式を何という？",a:"デジタル。"},
{q:"デジタル化された情報の量の最小単位を何という？",a:"ビット。"},
{q:"1バイト（B）は何ビット？",a:"8ビット。"},
{q:"1KB（キロバイト）は何バイト？",a:"1024B。"},
{q:"1MB（メガバイト）は何キロバイト？",a:"1024KB。"},
{q:"1GB（ギガバイト）は何メガバイト？",a:"1024MB。"},
{q:"1TB（テラバイト）は何ギガバイト？",a:"1024GB。"},
{q:"アナログ信号をデジタル信号に変換することを何という？",a:"A/D変換。"},
{q:"文字にあらかじめ割り当てられた、それぞれの文字を特定の数字に対応させる決まり（ルール）を何という？",a:"文字コード。"},
{q:"一定の範囲（間隔）あたりの画素の集まり（密度）を何という？",a:"解像度。"},
{q:"デジタル情報が持つ3つの特徴を答えなさい。",a:"①コンピュータで扱いやすい、②修正・複製しやすい、③さまざまな情報をまとめて扱える。"},

// === 3. 情報の表現と伝達 ===
{q:"人とコンピュータが接する部分（画面のデザインや操作方法など）を何という？",a:"ユーザーインターフェース（UI）。"},
{q:"言語の切り替えや拡大表示など、より多くの人が使いやすい設計を何という？",a:"ユニバーサルデザイン。"},
{q:"情報を視覚的・聴覚的に伝えるために橋渡しをする媒体や手段を何という？",a:"メディア。"},
{q:"「絵文字」「絵で表す言語」であり、視覚的に意味を伝えるために使われるものを何という？",a:"ピクトグラム。"},
{q:"コンピュータやテレビなど、さまざまな機器がネットワークに接続され、情報をやり取りするしくみを何という？",a:"情報通信ネットワーク。"},
{q:"限られた範囲の小規模なネットワークを何という？",a:"LAN（ラン）。"},
{q:"世界中のネットワークを接続した巨大なネットワークを何という？",a:"インターネット。"},
{q:"ネットを通じて他のコンピュータへのサービスを提供するネットワーク上のコンピュータを何という？",a:"サーバ。"},
{q:"サーバやネットワークを設置し、運用・管理するための専用施設を何という？",a:"データセンタ。"},
{q:"有線接続で、お互いに接続し、通信するための機器を何という？",a:"ハブ。"},
{q:"無線LANにおいて、お互いに接続し、通信するための機器を何という？",a:"アクセスポイント。"},
{q:"異なるネットワーク同士を接続する機器を何という？",a:"ルータ。"},
{q:"ネットワーク上でデータをやり取りするときの約束事を何という？",a:"プロトコル。"},
{q:"データを送信する際に、通信回線を効率よく使うことができるように分けられた、小さな塊を何という？",a:"パケット。"},
{q:"インターネットに接続された通信機器を特定・識別するための番号を何という？",a:"IPアドレス。"},
{q:"インターネット上の画像や文章などの閲覧を行うためのソフトウェアを何という？",a:"Webブラウザ。"},
{q:"Webにおける通信の約束事（プロトコル）を何という？",a:"http。"},
{q:"Webページ閲覧時の、Webページの住所に当たるものを何という？",a:"URL。"},
{q:"Webページを記述するときの言語を何という？",a:"HTML。"},

// === 4. 情報セキュリティと情報モラル ===
{q:"情報を安全に利用するための仕組みや対策を何という？",a:"情報セキュリティ。"},
{q:"サイバー空間に関する情報セキュリティを何という？",a:"サイバーセキュリティ。"},
{q:"使用者が許可された本人であることを確認することを何という？",a:"個人認証。"},
{q:"個人を識別するための番号や記号などを何という？",a:"ID。"},
{q:"本人であることを確認するための文字列や、指紋などの生体認証を何という？",a:"パスワード。"},
{q:"許可された通信のみをネットワーク内に通す、不正アクセスを防ぐための防壁を何という？",a:"ファイアウォール。"},
{q:"インターネット上の悪質なサイトや不適切な画像を遮断する機能を何という？",a:"フィルタリング。"},
{q:"情報を規則に基づいて、他者に意味が分からないものに変換することを何という？",a:"暗号化。"},
{q:"重要なデータやシステムを別の記憶装置に予備として保存することを何という？",a:"バックアップ。"},

// === 5. プログラムの構造と表現 ===
{q:"プログラムの3大処理（基本構造）をすべて答えなさい。",a:"順次、反復、分岐。"},
{q:"プログラムの3大処理のうち、上から順番に処理を行う構造を何という？",a:"順次。"},
{q:"プログラムの3大処理のうち、条件を満たす間、同じ処理を繰り返す構造を何という？",a:"反復。"},
{q:"プログラムの3大処理のうち、条件によって次に進む処理を分ける構造を何という？",a:"分岐。"}

// 追加用の問題データ（ここまでコピー）


];

let index = 0;

function displayQuestion(){
    document.getElementById("number").innerHTML =
        (index+1)+" / "+questions.length;

    document.getElementById("question").innerHTML =
        questions[index].q;

    document.getElementById("answer").style.display="none";

    document.getElementById("answer").innerHTML =
        "<b>答え：</b>"+questions[index].a;
}

function showAnswer(){
    document.getElementById("answer").style.display="block";
}

function nextQuestion(){
    index++;
    if(index>=questions.length){
        index=0;
    }
    displayQuestion();
}

function shuffleQuestions(){
    questions.sort(()=>Math.random()-0.5);
    index=0;
    displayQuestion();
}

displayQuestion();

</script>

</body>
</html>

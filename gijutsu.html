<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技術テスト予想問題50問</title>

<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    font-size:22px;
    text-align:center;
}

#number{
    color:#666;
    margin-bottom:15px;
}

#question{
    font-size:22px;
    font-weight:bold;
    line-height:1.5;
    margin-bottom:20px;
}

#answer{
    display:none;
    background:#e8f5e9;
    padding:15px;
    border-radius:8px;
    margin-top:15px;
    font-size:20px;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.show{
    background:#2196F3;
    color:white;
}

.next{
    background:#4CAF50;
    color:white;
}

.shuffle{
    background:#FF9800;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h1>技術テスト予想問題</h1>

<div id="number"></div>

<div id="question"></div>

<button class="show" onclick="showAnswer()">
答えを見る
</button>

<div id="answer"></div>

<button class="next" onclick="nextQuestion()">
次の問題
</button>



</div>

<script>

let questions = [

{q:"生物育成の技術の4つの分野は？",a:"作物栽培、動物飼育、水産生物の栽培、森林の育成。"},
{q:"生物育成の技術とは何か？",a:"生物を育てて食料や資源を生産する技術。"},
{q:"生物育成の目的は？",a:"食料や材料などを安定して得るため。"},
{q:"生物育成で重要なことは？",a:"生物の成長に適した環境を整えること。"},
{q:"生育環境とは何か？",a:"生物の成長に影響を与える周囲の条件。"},
{q:"生物育成技術に共通する目的は？",a:"生活に必要な食料や資源を生産すること。"},
{q:"植物が育つために必要なものを4つ答えなさい。",a:"水、光、空気、養分。"},
{q:"肥料を与える目的は？",a:"植物に必要な養分を補うため。"},
{q:"肥料を選ぶときに考えることは？",a:"植物の種類や成長段階に必要な養分。"},
{q:"窒素を多く含む肥料の効果は？",a:"葉や茎の成長を促す。"},
{q:"リン酸を多く含む肥料の効果は？",a:"花や実の成長を促す。"},
{q:"カリウムを多く含む肥料の効果は？",a:"根を丈夫にし病気に強くする。"},
{q:"種まき後に水を与える理由は？",a:"発芽を促すため。"},
{q:"間引きとは何か？",a:"混み合った苗を抜いて成長しやすくする作業。"},
{q:"除草を行う理由は？",a:"養分や水を雑草に取られないようにするため。"},
{q:"追肥とは何か？",a:"成長途中で追加して肥料を与えること。"},
{q:"土づくりの目的は？",a:"根が育ちやすい環境を作るため。"},
{q:"ナス栽培で日光が重要な理由は？",a:"光合成を行うため。"},
{q:"ナスのプランター栽培で最初に行うことは？",a:"栽培計画を立てること。"},
{q:"栽培計画を立てる目的は？",a:"効率よく育てるため。"},
{q:"ナス栽培で観察する主な項目は？",a:"草丈、葉の数、花、実の成長など。"},
{q:"ナス栽培で実がつく前に必要なことは？",a:"花を咲かせること。"},
{q:"ナスの収穫時期を判断するポイントは？",a:"実の大きさや色つや。"},
{q:"プランター栽培の利点は？",a:"狭い場所でも栽培できる。"},
{q:"さまざまな栽培方法の例を2つ答えなさい。",a:"露地栽培、施設栽培、水耕栽培など。"},
{q:"露地栽培とは？",a:"屋外の畑で育てる方法。"},
{q:"施設栽培とは？",a:"温室などの施設で育てる方法。"},
{q:"水耕栽培とは？",a:"土を使わず養液で育てる方法。"},
{q:"家畜とは何か？",a:"人間が利用するために飼育している動物。"},
{q:"動物飼育の目的は？",a:"肉、卵、乳などを得るため。"},
{q:"アニマルウェルフェアとは？",a:"動物が快適に暮らせるよう配慮する考え方。"},
{q:"養殖とは何か？",a:"魚や貝などを人工的に育てること。"},
{q:"養殖のメリットは？",a:"安定して生産できること。"},
{q:"放流とは何か？",a:"育てた魚などを自然に戻すこと。"},
{q:"森林の主な役割を3つ答えなさい。",a:"木材生産、水源保全、災害防止。"},
{q:"森林の育成で最初に行う作業は？",a:"植林。"},
{q:"植林とは何か？",a:"木を植えること。"},
{q:"下刈りとは何か？",a:"雑草や低木を刈る作業。"},
{q:"枝打ちとは何か？",a:"不要な枝を切る作業。"},
{q:"間伐とは何か？",a:"木を間引いて残りを育てやすくする作業。"},
{q:"森林で間伐を行う理由は？",a:"木の成長を良くするため。"},
{q:"森林管理をしないとどうなる？",a:"木が密集して健全に育たなくなる。"},
{q:"持続可能な社会とは？",a:"将来世代も安心して暮らせる社会。"},
{q:"新聞紙自動車製作で重要なことは？",a:"軽くて丈夫な構造にすること。"},
{q:"車輪がまっすぐ回るために重要な部分は？",a:"車軸。"},
{q:"設計図を作る目的は？",a:"効率よく正確に製作するため。"},
{q:"製作活動の流れは？",a:"計画→製作→評価→改善。"},
{q:"新聞紙自動車の評価観点を3つ答えなさい。",a:"知識・技能、思考・判断・表現、主体的に学習に取り組む態度。"},
{q:"評価とは何か？",a:"完成したものを振り返ること。"},
{q:"改善とは何か？",a:"問題点を見つけてより良くすること。"},
{q:"この単元全体で最も重要な考え方は？",a:"生物の特性を理解し適切な環境で育成すること。"}

];

let index = 0;

function displayQuestion(){
    document.getElementById("number").innerHTML =
        (index+1)+" / "+questions.length;

    document.getElementById("question").innerHTML =
        questions[index].q;

    document.getElementById("answer").style.display="none";

    document.getElementById("answer").innerHTML =
        "<b>答え：</b>"+questions[index].a;
}

function showAnswer(){
    document.getElementById("answer").style.display="block";
}

function nextQuestion(){
    index++;
    if(index>=questions.length){
        index=0;
    }
    displayQuestion();
}

function shuffleQuestions(){
    questions.sort(()=>Math.random()-0.5);
    index=0;
    displayQuestion();
}

displayQuestion();

</script>

</body>
</html>
